services:
  auth-api:
    image: <YOUR_IMAGE_REGISTRY>/kafucka-auth:latest
    container_name: kafucka-auth-api-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://<POSTGRES_USER>:<POSTGRES_PWD>@<MY_TAILSCALE_IP>:5432/<POSTGRES_DB_NAME>
      KAFKA_SERVER_URL: <MY_TAILSCALE_IP>:9092
      SECRET: your_secret_here
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"

  ingestion-api:
    image: <YOUR_IMAGE_REGISTRY>/kafucka-ingestion:latest
    container_name: kafucka-ingestion-api-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://<POSTGRES_USER>:<POSTGRES_PWD>@<MY_TAILSCALE_IP>:5432/<POSTGRES_DB_NAME>
      KAFKA_SERVER_URL: <MY_TAILSCALE_IP>:9092
      SECRET: your_secret_here
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8001:8000"
